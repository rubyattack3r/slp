name: Create Release Suite

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build Linux targets
        run: |
          make clean
          make all
          
          # Package Linux
          mkdir -p sleepy-linux-amd64/bin sleepy-linux-amd64/lib sleepy-linux-amd64/include
          cp bin/sleepy bin/aggressor bin/cna_bundler bin/cna_validator bin/sleepy_fmt bin/sleepyd bin/bench_sleepy sleepy-linux-amd64/bin/
          cp bin/libsleepy.a bin/libaggressor.a sleepy-linux-amd64/lib/
          cp dist/sleepy.h extensions/aggressor/aggressor.h sleepy-linux-amd64/include/
          tar -czf sleepy-${{ github.ref_name }}-linux-amd64.tar.gz sleepy-linux-amd64/

      - name: Build Windows targets (Nix MinGW Cross-Compile)
        run: |
          nix develop -c make clean
          nix develop -c make all CC=x86_64-w64-mingw32-gcc
          
          # Package Windows
          mkdir -p sleepy-windows-amd64/bin sleepy-windows-amd64/lib sleepy-windows-amd64/include
          cp bin/sleepy.exe bin/aggressor.exe bin/cna_bundler.exe bin/cna_validator.exe bin/sleepy_fmt.exe bin/sleepyd.exe bin/bench_sleepy.exe sleepy-windows-amd64/bin/
          cp bin/libsleepy.a bin/libaggressor.a sleepy-windows-amd64/lib/
          cp dist/sleepy.h extensions/aggressor/aggressor.h sleepy-windows-amd64/include/
          zip -r sleepy-${{ github.ref_name }}-windows-amd64.zip sleepy-windows-amd64/

      - name: Upload Linux archive
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: sleepy-${{ github.ref_name }}-linux-amd64.tar.gz

      - name: Upload Windows archive
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: sleepy-${{ github.ref_name }}-windows-amd64.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build macOS Universal targets
        run: |
          make clean
          make all CC="clang -arch arm64 -arch x86_64" CXX="clang++ -arch arm64 -arch x86_64"
          
          # Package macOS
          mkdir -p sleepy-macos-universal/bin sleepy-macos-universal/lib sleepy-macos-universal/include
          cp bin/sleepy bin/aggressor bin/cna_bundler bin/cna_validator bin/sleepy_fmt bin/sleepyd bin/bench_sleepy sleepy-macos-universal/bin/
          cp bin/libsleepy.a bin/libaggressor.a sleepy-macos-universal/lib/
          cp dist/sleepy.h extensions/aggressor/aggressor.h sleepy-macos-universal/include/
          tar -czf sleepy-${{ github.ref_name }}-macos-universal.tar.gz sleepy-macos-universal/

      - name: Upload macOS archive
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: sleepy-${{ github.ref_name }}-macos-universal.tar.gz

  publish-release:
    runs-on: ubuntu-latest
    needs: [build-linux-windows, build-macos]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Linux release archive
        uses: actions/download-artifact@v4
        with:
          name: linux-amd64

      - name: Download Windows release archive
        uses: actions/download-artifact@v4
        with:
          name: windows-amd64

      - name: Download macOS release archive
        uses: actions/download-artifact@v4
        with:
          name: macos-universal

      - name: Create draft release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            sleepy-${{ github.ref_name }}-linux-amd64.tar.gz
            sleepy-${{ github.ref_name }}-windows-amd64.zip
            sleepy-${{ github.ref_name }}-macos-universal.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
