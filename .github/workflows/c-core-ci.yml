name: C Core CI

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'src/**'
      - 'include/**'
      - 'tests/**'
      - 'extensions/**'
      - 'deps/**'
      - 'tools/**'
      - 'Makefile'
      - '.github/workflows/c-core-ci.yml'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'src/**'
      - 'include/**'
      - 'tests/**'
      - 'extensions/**'
      - 'deps/**'
      - 'tools/**'
      - 'Makefile'
      - '.github/workflows/c-core-ci.yml'

jobs:
  test-cross-platform:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify clean build
        run: |
          make clean
          make all

      - name: Run unit tests
        run: |
          make test

      - name: Run performance benchmarks
        run: |
          make bench

      - name: Verify CNA Code Formatting / Linting
        run: |
          # Format check a production script to verify formatting & parsing
          ./bin/slp_fmt third_party/Kerbeus-BOF/kerbeus_cs.cna

      - name: Run CNA Bundler (Consolidation)
        run: |
          mkdir -p dist
          ./bin/cna_bundler ./third_party -o ./dist/packaged_tools.cna

      - name: Run CNA Dry-Run Validator (Simulations)
        run: |
          ./bin/cna_validator ./dist/packaged_tools.cna

      - name: Archive and Package Consolidated CNA Bundle
        uses: actions/upload-artifact@v4
        with:
          name: packaged-cna-bundle-${{ matrix.os }}
          path: |
            dist/packaged_tools.cna
